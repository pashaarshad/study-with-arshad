<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027" />
            <stop offset="50%" stop-color="#203a43" />
            <stop offset="100%" stop-color="#2c5364" />
        </linearGradient>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F2C94C" />
            <stop offset="100%" stop-color="#F2994A" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#F2C94C" opacity="0.9"/>
        </marker>
    </defs>

    <rect width="800" height="350" rx="16" fill="url(#bg)" />
    
    <!-- Stage 1: Data Sources -->
    <g transform="translate(40, 70)">
        <text x="75" y="0" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Data Sources</text>
        
        <g transform="translate(0, 20)" filter="url(#shadow)">
            <rect width="150" height="60" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
            <text x="30" y="38" font-size="24">📝</text>
            <text x="90" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Flat Files</text>
        </g>
        
        <g transform="translate(0, 100)" filter="url(#shadow)">
            <rect width="150" height="60" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
            <text x="30" y="38" font-size="24">🗄️</text>
            <text x="90" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">OLTP DBs</text>
        </g>

        <g transform="translate(0, 180)" filter="url(#shadow)">
            <rect width="150" height="60" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
            <text x="30" y="38" font-size="24">🌐</text>
            <text x="90" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">External</text>
        </g>
    </g>

    <!-- Arrows to ETL -->
    <line x1="190" y1="120" x2="280" y2="175" stroke="url(#gold)" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="190" y1="200" x2="280" y2="200" stroke="url(#gold)" stroke-width="3" marker-end="url(#arrow)" />
    <line x1="190" y1="280" x2="280" y2="225" stroke="url(#gold)" stroke-width="3" marker-end="url(#arrow)" />

    <!-- Stage 2: ETL -->
    <g transform="translate(290, 120)" filter="url(#shadow)">
        <rect width="180" height="150" rx="12" fill="rgba(242, 201, 76, 0.15)" stroke="#F2C94C" stroke-width="3" />
        <text x="90" y="45" font-family="'Inter', sans-serif" font-size="28" font-weight="800" fill="#F2C94C" text-anchor="middle" filter="url(#glow)">ETL</text>
        
        <rect x="20" y="65" width="140" height="20" rx="4" fill="rgba(255,255,255,0.1)" />
        <text x="90" y="80" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Extract</text>
        
        <rect x="20" y="95" width="140" height="20" rx="4" fill="rgba(255,255,255,0.1)" />
        <text x="90" y="110" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Transform</text>
        
        <rect x="20" y="125" width="140" height="20" rx="4" fill="rgba(255,255,255,0.1)" />
        <text x="90" y="140" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Load</text>
    </g>

    <!-- Arrow to Data Warehouse -->
    <line x1="470" y1="200" x2="560" y2="200" stroke="url(#gold)" stroke-width="4" marker-end="url(#arrow)" />

    <!-- Stage 3: Data Warehouse -->
    <g transform="translate(570, 70)" filter="url(#shadow)">
        <text x="95" y="0" font-family="'Inter', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Data Warehouse</text>
        
        <!-- Large Database Cylinder -->
        <g transform="translate(25, 30)">
            <ellipse cx="70" cy="30" rx="70" ry="20" fill="#48DBFB" opacity="0.9" />
            <path d="M 0 30 L 0 160 A 70 20 0 0 0 140 160 L 140 30" fill="#0abde3" opacity="0.8" />
            <ellipse cx="70" cy="160" rx="70" ry="20" fill="#0abde3" opacity="0.8" />
            
            <!-- Details inside DB -->
            <path d="M 0 70 A 70 20 0 0 0 140 70" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
            <path d="M 0 115 A 70 20 0 0 0 140 115" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" />
            
            <text x="70" y="105" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">ENTERPRISE</text>
            <text x="70" y="135" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">DATA</text>
        </g>
    </g>
</svg>
