<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
    <defs>
        <linearGradient id="dbms-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3C72" />
            <stop offset="100%" stop-color="#2A5298" />
        </linearGradient>
        <linearGradient id="dm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A00E0" />
            <stop offset="100%" stop-color="#8E2DE2" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background split -->
    <rect x="0" y="0" width="425" height="400" fill="url(#dbms-bg)" />
    <rect x="425" y="0" width="425" height="400" fill="url(#dm-bg)" />
    
    <!-- DBMS Side (Left) -->
    <g transform="translate(100, 80)">
        <text x="112.5" y="40" font-family="'Inter', sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">DBMS</text>
        <text x="112.5" y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Store &amp; Retrieve</text>
        
        <!-- Filing Cabinet Icon -->
        <g transform="translate(62, 100)">
            <rect width="100" height="140" rx="8" fill="#ffffff" opacity="0.9" filter="url(#shadow)" />
            <rect x="10" y="10" width="80" height="35" rx="4" fill="#E2E8F0" />
            <line x1="40" y1="27" x2="60" y2="27" stroke="#A0AEC0" stroke-width="4" stroke-linecap="round" />
            
            <rect x="10" y="55" width="80" height="35" rx="4" fill="#E2E8F0" />
            <line x1="40" y1="72" x2="60" y2="72" stroke="#A0AEC0" stroke-width="4" stroke-linecap="round" />
            
            <rect x="10" y="100" width="80" height="35" rx="4" fill="#E2E8F0" />
            <line x1="40" y1="117" x2="60" y2="117" stroke="#A0AEC0" stroke-width="4" stroke-linecap="round" />
        </g>
    </g>

    <!-- Data Mining Side (Right) -->
    <g transform="translate(525, 80)">
        <text x="112.5" y="40" font-family="'Inter', sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Data Mining</text>
        <text x="112.5" y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Discover &amp; Predict</text>
        
        <!-- Magnifying Glass & Patterns Icon -->
        <g transform="translate(62, 100)">
            <!-- Network/Patterns Background -->
            <circle cx="20" cy="30" r="6" fill="#D6BCFA" />
            <circle cx="80" cy="50" r="6" fill="#D6BCFA" />
            <circle cx="50" cy="90" r="6" fill="#D6BCFA" />
            <circle cx="90" cy="120" r="6" fill="#D6BCFA" />
            <line x1="20" y1="30" x2="80" y2="50" stroke="#D6BCFA" stroke-width="3" opacity="0.6"/>
            <line x1="80" y1="50" x2="50" y2="90" stroke="#D6BCFA" stroke-width="3" opacity="0.6"/>
            <line x1="50" y1="90" x2="90" y2="120" stroke="#D6BCFA" stroke-width="3" opacity="0.6"/>
            <line x1="20" y1="30" x2="50" y2="90" stroke="#D6BCFA" stroke-width="3" opacity="0.6"/>
            
            <!-- Magnifying Glass -->
            <circle cx="60" cy="65" r="45" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="8" filter="url(#shadow)" />
            <line x1="30" y1="95" x2="0" y2="140" stroke="#ffffff" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />
            
            <!-- Sparkle/Lightbulb effect -->
            <path d="M60 20 L65 35 L80 40 L65 45 L60 60 L55 45 L40 40 L55 35 Z" fill="#F6E05E" filter="url(#glow)" />
        </g>
    </g>

    <!-- VS Badge in the center -->
    <g transform="translate(425, 200)" filter="url(#shadow)">
        <circle cx="0" cy="0" r="45" fill="#ffffff" />
        <circle cx="0" cy="0" r="38" fill="none" stroke="#E2E8F0" stroke-width="2" />
        <text x="0" y="12" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="#2D3748" text-anchor="middle" font-style="italic">VS</text>
    </g>

    <!-- Subtitles at the bottom -->
    <text x="212.5" y="360" font-family="'Inter', sans-serif" font-size="15" font-weight="500" fill="#ffffff" text-anchor="middle">"What was my exact balance on Tuesday?"</text>
    <text x="637.5" y="360" font-family="'Inter', sans-serif" font-size="15" font-weight="500" fill="#ffffff" text-anchor="middle">"Which customers are likely to churn next month?"</text>
</svg>
