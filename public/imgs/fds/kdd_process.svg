<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1A2980" />
            <stop offset="100%" stop-color="#26D0CE" />
        </linearGradient>
        <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" opacity="0.8"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="900" height="350" fill="url(#bg)" rx="16" />
    
    <!-- Title -->
    <text x="450" y="50" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">The 7 Steps of the KDD Process</text>
    
    <!-- Step 1: Cleaning -->
    <g transform="translate(40, 100)" filter="url(#shadow)">
        <rect x="0" y="0" width="100" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="50" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="50" y="48" font-size="24" text-anchor="middle">🧹</text>
        <text x="50" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data</text>
        <text x="50" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Cleaning</text>
    </g>

    <!-- Arrow 1 -->
    <line x1="150" y1="160" x2="160" y2="160" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 2: Integration -->
    <g transform="translate(155, 170)" filter="url(#shadow)">
        <rect x="0" y="0" width="100" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="50" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="50" y="48" font-size="24" text-anchor="middle">🔗</text>
        <text x="50" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data</text>
        <text x="50" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Integration</text>
    </g>

    <!-- Arrow 2 -->
    <line x1="265" y1="230" x2="275" y2="230" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 3: Selection -->
    <g transform="translate(270, 100)" filter="url(#shadow)">
        <rect x="0" y="0" width="100" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="50" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="50" y="48" font-size="24" text-anchor="middle">🎯</text>
        <text x="50" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data</text>
        <text x="50" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Selection</text>
    </g>

    <!-- Arrow 3 -->
    <line x1="380" y1="160" x2="390" y2="160" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 4: Transformation -->
    <g transform="translate(385, 170)" filter="url(#shadow)">
        <rect x="0" y="0" width="112" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="56" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="56" y="48" font-size="24" text-anchor="middle">🔄</text>
        <text x="56" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data</text>
        <text x="56" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Transformation</text>
    </g>

    <!-- Arrow 4 -->
    <line x1="507" y1="230" x2="517" y2="230" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 5: Data Mining (Core Step - Highlighted) -->
    <g transform="translate(512, 80)" filter="url(#shadow)">
        <rect x="0" y="0" width="120" height="140" rx="16" fill="rgba(255, 215, 0, 0.2)" stroke="#FFD700" stroke-width="3" />
        <circle cx="60" cy="45" r="30" fill="rgba(255, 215, 0, 0.3)" />
        <text x="60" y="55" font-size="30" text-anchor="middle">⛏️</text>
        <text x="60" y="95" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#FFD700" text-anchor="middle" filter="url(#glow)">Data</text>
        <text x="60" y="118" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#FFD700" text-anchor="middle" filter="url(#glow)">Mining</text>
        <rect x="25" y="-12" width="70" height="20" rx="10" fill="#FFD700" />
        <text x="60" y="2" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">CORE STEP</text>
    </g>

    <!-- Arrow 5 -->
    <line x1="642" y1="150" x2="652" y2="150" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 6: Pattern Evaluation -->
    <g transform="translate(647, 170)" filter="url(#shadow)">
        <rect x="0" y="0" width="105" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="52.5" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="52.5" y="48" font-size="24" text-anchor="middle">📈</text>
        <text x="52.5" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Pattern</text>
        <text x="52.5" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Evaluation</text>
    </g>

    <!-- Arrow 6 -->
    <line x1="762" y1="230" x2="772" y2="230" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Step 7: Knowledge Rep -->
    <g transform="translate(767, 100)" filter="url(#shadow)">
        <rect x="0" y="0" width="105" height="120" rx="12" fill="url(#card)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <circle cx="52.5" cy="40" r="24" fill="rgba(255,255,255,0.2)" />
        <text x="52.5" y="48" font-size="24" text-anchor="middle">💡</text>
        <text x="52.5" y="85" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Knowledge</text>
        <text x="52.5" y="105" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Representation</text>
    </g>

    <!-- Subtitle explaining KDD process vs Data Mining -->
    <text x="450" y="325" font-family="'Inter', sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Note: Data Mining is just one specific step (Step 5) in the entire end-to-end KDD Process.</text>
</svg>
