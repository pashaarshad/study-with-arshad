<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027" />
            <stop offset="50%" stop-color="#203a43" />
            <stop offset="100%" stop-color="#2c5364" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="fact" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3A1C71" />
            <stop offset="50%" stop-color="#D76D77" />
            <stop offset="100%" stop-color="#FFAF7B" />
        </linearGradient>
        <linearGradient id="dim" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#11998E" />
            <stop offset="100%" stop-color="#38EF7D" />
        </linearGradient>
        <linearGradient id="subdim" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00C9FF" />
            <stop offset="100%" stop-color="#92FE9D" />
        </linearGradient>
    </defs>

    <rect width="900" height="450" rx="16" fill="url(#bg)" />

    <!-- Split Divider -->
    <line x1="450" y1="50" x2="450" y2="400" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8 4" />

    <!-- Left Side: Star Schema -->
    <text x="225" y="40" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Star Schema ⭐</text>
    
    <g transform="translate(225, 230)">
        <!-- Connections -->
        <line x1="0" y1="0" x2="-100" y2="-100" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="100" y2="-100" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="-100" y2="100" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="100" y2="100" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />

        <!-- Dimension Tables -->
        <g transform="translate(-100, -100)" filter="url(#shadow)">
            <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">TIME</text>
        </g>
        <g transform="translate(100, -100)" filter="url(#shadow)">
            <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">PRODUCT</text>
        </g>
        <g transform="translate(-100, 100)" filter="url(#shadow)">
            <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">LOCATION</text>
        </g>
        <g transform="translate(100, 100)" filter="url(#shadow)">
            <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">CUSTOMER</text>
        </g>

        <!-- Fact Table (Center) -->
        <g filter="url(#shadow)">
            <rect x="-60" y="-45" width="120" height="90" rx="10" fill="url(#fact)" />
            <text x="0" y="-10" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">SALES</text>
            <text x="0" y="10" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">FACT TABLE</text>
        </g>
    </g>


    <!-- Right Side: Snowflake Schema -->
    <text x="675" y="40" font-family="'Inter', sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Snowflake Schema ❄️</text>
    
    <g transform="translate(675, 230)">
        <!-- Complex Connections -->
        <line x1="0" y1="0" x2="-80" y2="-80" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="80" y2="-80" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="-80" y2="80" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />
        <line x1="0" y1="0" x2="80" y2="80" stroke="rgba(255, 255, 255, 0.4)" stroke-width="3" />

        <!-- Further normalized branching (Snowflake) -->
        <line x1="-80" y1="-80" x2="-150" y2="-120" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="4" />
        <line x1="80" y1="-80" x2="150" y2="-120" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="4" />
        <line x1="-80" y1="80" x2="-150" y2="120" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="4" />
        <line x1="80" y1="80" x2="160" y2="80" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="4" />
        <line x1="80" y1="80" x2="120" y2="150" stroke="rgba(255, 255, 255, 0.4)" stroke-width="2" stroke-dasharray="4" />

        <!-- Sub-dimension Tables -->
        <g transform="translate(-150, -120)" filter="url(#shadow)">
            <rect x="-35" y="-20" width="70" height="40" rx="6" fill="url(#subdim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">MONTH</text>
        </g>
        <g transform="translate(150, -120)" filter="url(#shadow)">
            <rect x="-40" y="-20" width="80" height="40" rx="6" fill="url(#subdim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">CATEGORY</text>
        </g>
        <g transform="translate(-150, 120)" filter="url(#shadow)">
            <rect x="-35" y="-20" width="70" height="40" rx="6" fill="url(#subdim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">STATE</text>
        </g>
        <g transform="translate(160, 80)" filter="url(#shadow)">
            <rect x="-35" y="-20" width="70" height="40" rx="6" fill="url(#subdim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">CITY</text>
        </g>
        <g transform="translate(120, 150)" filter="url(#shadow)">
            <rect x="-40" y="-20" width="80" height="40" rx="6" fill="url(#subdim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">ZIP CODE</text>
        </g>

        <!-- Dimension Tables -->
        <g transform="translate(-80, -80)" filter="url(#shadow)">
            <rect x="-40" y="-25" width="80" height="50" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">TIME</text>
        </g>
        <g transform="translate(80, -80)" filter="url(#shadow)">
            <rect x="-40" y="-25" width="80" height="50" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">PRODUCT</text>
        </g>
        <g transform="translate(-80, 80)" filter="url(#shadow)">
            <rect x="-40" y="-25" width="80" height="50" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">LOCATION</text>
        </g>
        <g transform="translate(80, 80)" filter="url(#shadow)">
            <rect x="-40" y="-25" width="80" height="50" rx="8" fill="url(#dim)" />
            <text x="0" y="5" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">CUST</text>
        </g>

        <!-- Fact Table (Center) -->
        <g filter="url(#shadow)">
            <rect x="-60" y="-45" width="120" height="90" rx="10" fill="url(#fact)" />
            <text x="0" y="-10" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">SALES</text>
            <text x="0" y="10" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">FACT TABLE</text>
        </g>
    </g>

</svg>
