<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
    <defs>
        <linearGradient id="oltp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2D3748" />
            <stop offset="100%" stop-color="#1A202C" />
        </linearGradient>
        <linearGradient id="olap-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E3A8A" />
            <stop offset="100%" stop-color="#172554" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="green-glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feComponentTransfer in="coloredBlur" result="glow">
                <feFuncA type="linear" slope="1.5"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="glow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect x="0" y="0" width="425" height="400" fill="url(#oltp-bg)" />
    <rect x="425" y="0" width="425" height="400" fill="url(#olap-bg)" />
    
    <!-- OLTP Side -->
    <g transform="translate(100, 80)">
        <text x="112.5" y="40" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="#48BB78" text-anchor="middle" filter="url(#green-glow)">OLTP</text>
        <text x="112.5" y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Online Transaction Processing</text>
        
        <g transform="translate(62, 110)" filter="url(#shadow)">
            <rect width="100" height="120" rx="12" fill="rgba(255,255,255,0.1)" stroke="#48BB78" stroke-width="3" />
            <text x="50" y="60" font-size="40" text-anchor="middle">🛒</text>
            <text x="50" y="90" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Active Store</text>
            
            <!-- Quick transactions -->
            <line x1="-30" y1="20" x2="0" y2="30" stroke="#48BB78" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrow)" opacity="0.8" />
            <line x1="-30" y1="60" x2="0" y2="60" stroke="#48BB78" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrow)" opacity="0.8" />
            <line x1="-30" y1="100" x2="0" y2="90" stroke="#48BB78" stroke-width="3" stroke-dasharray="4" marker-end="url(#arrow)" opacity="0.8" />
            <text x="-40" y="65" font-size="20" text-anchor="middle">🏃</text>
        </g>

        <text x="112.5" y="270" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Focus: Fast, day-to-day operations</text>
        <text x="112.5" y="295" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data: Current and detailed</text>
    </g>

    <!-- OLAP Side -->
    <g transform="translate(525, 80)">
        <text x="112.5" y="40" font-family="'Inter', sans-serif" font-size="34" font-weight="900" fill="#60A5FA" text-anchor="middle" filter="url(#glow)">OLAP</text>
        <text x="112.5" y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">Online Analytical Processing</text>
        
        <g transform="translate(62, 110)" filter="url(#shadow)">
            <rect width="100" height="120" rx="12" fill="rgba(255,255,255,0.1)" stroke="#60A5FA" stroke-width="3" />
            <text x="50" y="60" font-size="40" text-anchor="middle">📊</text>
            <text x="50" y="90" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Analysts</text>
            
            <!-- Large analytical queries -->
            <path d="M 100 60 Q 130 0 150 40" fill="none" stroke="#60A5FA" stroke-width="3" stroke-dasharray="8 4" opacity="0.8" />
            <text x="145" y="75" font-size="20" text-anchor="middle">🧠</text>
        </g>

        <text x="112.5" y="270" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Focus: Complex analysis &amp; decision making</text>
        <text x="112.5" y="295" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Data: Historical and summarized</text>
    </g>

    <g transform="translate(425, 200)" filter="url(#shadow)">
        <circle cx="0" cy="0" r="45" fill="#2d3748" stroke="#4a5568" stroke-width="4" />
        <text x="0" y="12" font-family="'Inter', sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle" font-style="italic">VS</text>
    </g>
</svg>
