<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027" />
            <stop offset="50%" stop-color="#203a43" />
            <stop offset="100%" stop-color="#2c5364" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF416C" />
            <stop offset="100%" stop-color="#FF4B2B" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="700" height="700" rx="20" fill="url(#bg)" />

    <!-- Center Node -->
    <g transform="translate(350, 350)" filter="url(#shadow)">
        <circle r="90" fill="url(#centerGrad)" stroke="#ffffff" stroke-width="4" />
        <text y="-10" font-family="'Inter', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">Data Mining</text>
        <text y="20" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">Applications</text>
    </g>

    <!-- The 7 Application Nodes around the center -->
    <!-- Math for 7 nodes: 360 / 7 = 51.4 degrees each. Radius = 200 -->

    <g transform="translate(350, 350)">
        
        <!-- Node 1: Retail (Top: 0 deg -> rotated -90 = 0, -200) -->
        <!-- Connecting Line -->
        <line x1="0" y1="-90" x2="0" y2="-160" stroke="#FFD700" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(0, -210)" filter="url(#shadow)">
            <circle r="50" fill="rgba(255, 215, 0, 0.2)" stroke="#FFD700" stroke-width="3" />
            <circle r="35" fill="rgba(255, 215, 0, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">🛒</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Retail</text>
        </g>

        <!-- Node 2: Banking (51.4 deg) -->
        <line x1="70" y1="-56" x2="125" y2="-100" stroke="#00E676" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(164, -131)" filter="url(#shadow)">
            <circle r="50" fill="rgba(0, 230, 118, 0.2)" stroke="#00E676" stroke-width="3" />
            <circle r="35" fill="rgba(0, 230, 118, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">🏦</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Banking</text>
        </g>

        <!-- Node 3: Healthcare (102.8 deg) -->
        <line x1="88" y1="20" x2="157" y2="35" stroke="#00E676" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(205, 46)" filter="url(#shadow)">
            <circle r="50" fill="rgba(64, 196, 255, 0.2)" stroke="#40C4FF" stroke-width="3" />
            <circle r="35" fill="rgba(64, 196, 255, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">🏥</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Healthcare</text>
        </g>

        <!-- Node 4: Education (154.2 deg) -->
        <line x1="40" y1="80" x2="71" y2="143" stroke="#E040FB" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(93, 188)" filter="url(#shadow)">
            <circle r="50" fill="rgba(224, 64, 251, 0.2)" stroke="#E040FB" stroke-width="3" />
            <circle r="35" fill="rgba(224, 64, 251, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">📚</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Education</text>
        </g>

        <!-- Node 5: Telecom (205.7 deg) -->
        <line x1="-40" y1="80" x2="-71" y2="143" stroke="#FF6E40" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(-93, 188)" filter="url(#shadow)">
            <circle r="50" fill="rgba(255, 110, 64, 0.2)" stroke="#FF6E40" stroke-width="3" />
            <circle r="35" fill="rgba(255, 110, 64, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">📱</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Telecom</text>
        </g>

        <!-- Node 6: Web / Social (257.1 deg) -->
        <line x1="-88" y1="20" x2="-157" y2="35" stroke="#FF5252" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(-205, 46)" filter="url(#shadow)">
            <circle r="50" fill="rgba(255, 82, 82, 0.2)" stroke="#FF5252" stroke-width="3" />
            <circle r="35" fill="rgba(255, 82, 82, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">🌐</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Web / Social</text>
        </g>

        <!-- Node 7: Science (308.5 deg) -->
        <line x1="-70" y1="-56" x2="-125" y2="-100" stroke="#00BCD4" stroke-width="3" stroke-dasharray="6,4" />
        <g transform="translate(-164, -131)" filter="url(#shadow)">
            <circle r="50" fill="rgba(0, 188, 212, 0.2)" stroke="#00BCD4" stroke-width="3" />
            <circle r="35" fill="rgba(0, 188, 212, 0.4)" />
            <text y="8" font-size="30" text-anchor="middle">🔬</text>
            <text y="70" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Science</text>
        </g>
    </g>

</svg>
